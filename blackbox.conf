<VirtualHost *:80>
    ServerName  server1.blackbox.com
    ServerAlias blackbox.com
    ServerAdmin smiker@mageek.com

    DocumentRoot "/mnt/c/codigo/BlackBox/server"

    <Directory /mnt/c/codigo/BlackBox/server>
        <Files index.php>
            Require all granted
        </Files>
        Require all granted
    </Directory>

    LogLevel warn

    ErrorLog    /mnt/d/var/log/blackbox/error.log
    CustomLog   /mnt/d/var/log/blackbox/access.log combined
</VirtualHost>
<VirtualHost *:80>
    ServerName  www.blackbox.com
    ServerAlias blackbox.com
    ServerAdmin smiker@mageek.com

    DocumentRoot "/mnt/d/www/blackbox"

    <Directory /mnt/d/www/blackbox>
        <Files index.html>
            Require all granted
        </Files>
        Require all granted
    </Directory>

    LogLevel warn

    ErrorLog    /mnt/d/var/log/blackbox/error.log
    CustomLog   /mnt/d/var/log/blackbox/access.log combined
</VirtualHost>
